name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -scheme Nook -configuration Debug \
            MACOSX_DEPLOYMENT_TARGET=15.5 \
            build 2>&1 | tee build.log
      - name: Show errors
        if: failure()
        run: grep -E 'error:|BUILD FAILED' build.log || true
