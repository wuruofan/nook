name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme Nook -configuration Debug \
            MACOSX_DEPLOYMENT_TARGET=15.5 \
            -quiet \
            build 2>&1 | tee build.log
      - name: Show errors
        if: always()
        run: |
          echo "=== exit status of xcodebuild pipeline ==="
          echo "=== filtered errors and warnings ==="
          # Strip ANSI color codes, then show error/warning lines plus a bit of context
          sed -E 's/\x1B\[[0-9;]*[mK]//g' build.log \
            | grep -E '(error|warning|BUILD)' \
            | head -100 \
            || echo "(no error/warning lines found)"
