name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -scheme Nook -configuration Release \
            MACOSX_DEPLOYMENT_TARGET=15.5 \
            -derivedDataPath build \
            build

      - name: Package ZIP
        run: |
          cd build/Build/Products/Release
          zip -r "${{ github.workspace }}/Nook.app.zip" Nook.app

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/Nook.app"
          DMG_PATH="${{ github.workspace }}/Nook.dmg"
          DMG_VOLUME="Nook"

          # Create a temporary DMG
          hdiutil create -volname "$DMG_VOLUME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Nook.app.zip
            Nook.dmg
          generate_release_notes: true
